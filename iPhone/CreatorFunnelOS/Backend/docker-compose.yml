services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: creator
      POSTGRES_PASSWORD: creator
      POSTGRES_DB: creator_funnel_os
    ports:
      - "5432:5432"
    volumes:
      - creator_funnel_os_data:/var/lib/postgresql/data
  api:
    build: .
    env_file: .env
    depends_on:
      - postgres
    ports:
      - "8080:8080"

volumes:
  creator_funnel_os_data:
